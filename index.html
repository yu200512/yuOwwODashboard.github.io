<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人导航主页</title>
    <style>
        html {
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Microsoft YaHei", sans-serif;
            text-align: center;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
            background-color: #f4f4f9;
            color: #333;
            margin-top: 0;
            background-color: transparent;
            background-size: cover; /* 让图片等比例缩放铺满整个屏幕 */
            background-position: center; /* 居中显示 */
            background-attachment: fixed;
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* 保证视频等比例铺满屏幕 */
            z-index: -1; /* 放到最底层，相当于 background */
        }

        /* -- 手写图片标题的样式 -- */
        .custom-title {
            width: 40%;
            max-width: 400px; /* 控制图片不要太大 */
            margin-top: 1px;
            margin-bottom: 1px;
            /* 极其关键：给透明图片加一层柔和的阴影，防止在复杂的动态壁纸上看不清 */
            filter: drop-shadow(0 0 12px rgb(251, 250, 250, 0.9)); 
            transition: transform 0.3s ease;
        }

        .custom-title:hover {
            transform: scale(1.05); /* 鼠标放上去时会微微放大，增加互动感 */
        }

        p {
            color: #666;
            margin-bottom: 40px;
        }

        /* -- 右上角天气组件样式 -- */
        .weather-widget {
            position: fixed; /* 固定位置，页面滚动时它也会在右上角 */
            top: 20px;
            right: 30px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
            z-index: 1000; /* 确保它不会被其他元素遮挡 */
        }

        /* -- 搜索框样式 -- */
        .search-container {
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        
        .search-input {
            width: 400px;
            max-width: 70vw;
            padding: 12px 20px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 30px;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: #0056b3;
            box-shadow: 0 4px 12px rgba(0, 86, 179, 0.2);
        }

        .search-btn {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            background-color: #004494;
            transform: translateY(-2px);
        }

        /* -- 每日名言卡片样式 -- */
        .card {
            background: rgba(255, 255, 255, 0.3);
            max-width: 800px;
            margin: 0 auto 40px auto; /* 居中并与下方保持距离 */
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            text-align: left;
            position: relative;
        }
        
        /* 添加一个引号小装饰 */
        .card::before {
            content: "“";
            font-size: 60px;
            color: #e0e6ed;
            position: absolute;
            top: -10px;
            left: 15px;
            font-family: serif;
        }

        #quote {
            font-family: "MV Boli", "Segoe Script", cursive;
            font-size: 24px;
            font-style: italic;
            color: #555;
            margin-bottom: 15px;
        }

        #author {
            font-family: "Brush Script MT", "Segoe Script", cursive;
            margin-top: 15px;
            font-size: 18px;
            color: #888;
            text-align: right;
            font-weight: bold;
        }
        
        /* -- 圆形图标样式 -- */
        .link-container {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 25px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .nav-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 70px;
            height: 70px;
            background-color: #ffffff;
            border-radius: 50%;
            border: 1px solid #ddd;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .nav-icon img {
            width: 36px;
            height: 36px;
            object-fit: contain;
        }

        .nav-icon:hover {
            background-color: #eef2f5;
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }

        /* -- Bottom Hover Menu Styles -- */
        .bottom-menu-container {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px; /* Width of the trigger button */
            height: 35px; /* Height of the trigger button */
            z-index: 1000;
        }

        .menu-trigger {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-align: center;
            line-height: 35px;
            border-radius: 15px 15px 0 0; /* Rounded top corners only */
            color: #333;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-bottom: none;
            box-shadow: 0 -4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .blank-panel {
            position: absolute;
            bottom: 35px; /* Sits exactly on top of the trigger */
            left: 50%;
            transform: translateX(-50%) translateY(20px); /* Starts slightly pushed down */
            width: 80vw; /* Takes up 80% of the screen width */
            max-width: 900px;
            height: 60vh; /* Takes up 60% of the screen height */
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px 20px 0 0;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 -10px 25px rgba(0,0,0,0.1);
            
            /* Hidden by default */
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); /* Smooth bounce effect */
        }

        /* The Magic: When hovering over the container, show the panel */
        .bottom-menu-container:hover .blank-panel {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0); /* Slides up into place */
        }
        
        .bottom-menu-container:hover .menu-trigger {
            background: rgba(255, 255, 255, 0.9);
        }

       /* -- 面板内部内容样式 -- */
        .panel-content {
            padding: 40px 20px;
            text-align: center;
        }

        .panel-content h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
        }

        /* 美化原生的音频播放器 */
        .panel-content audio {
            width: 80%;
            max-width: 400px; /* 限制最大宽度，看起来更协调 */
            height: 40px;
            outline: none;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .panel-content audio:hover {
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            transform: translateY(-2px);
        }

        /* -- 第一屏占位样式 -- */
        /* 【替换】第一屏的样式 */
        .main-content {
            height: 100vh; /* 强制占据正好一屏幕的高度 */
            scroll-snap-align: start; /* 核心：滚动时瞬间对齐顶部 */
            padding-top: 50px; /* 把原来 body 的顶部距离移到这里 */
            box-sizing: border-box;
            
            /* 确保内部元素居中排列 */
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        /* 【替换】第二屏的样式 */
        .second-page {
            height: 100vh; /* 同样强制占据正好一屏幕的高度 */
            scroll-snap-align: start; /* 核心：滚动时瞬间对齐顶部 */
            
            /* 下面的毛玻璃样式保持不变 */
            width: 100%;
            max-width: 10000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            padding: 60px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .second-page h2 {
            font-size: 28px;
            color: #222;
            text-shadow: 0 2px 4px rgba(255,255,255,0.8); /* 防止深色壁纸导致黑字看不清 */
            margin-bottom: 20px;
        }

        /* -- 第二页双栏布局 -- */
        .split-container {
            display: flex;
            width: 100%;
            max-width: 1200px; /* 限制最大宽度，让两栏在超宽显示器上也不会离得太远 */
            height: calc(100% - 40px); /* 留出一点上下边距 */
            margin: 0 auto;
            gap: 40px; /* 左右两块卡片之间的间距 */
        }

        /* 左右面板的共同玻璃卡片样式 */
        .left-panel, .right-panel {
            flex: 1; /* 核心：让左右两边严格平分 50% 宽度 */
            background: rgba(255, 255, 255, 0.2); /* 在原本的毛玻璃上再叠一层微微的白色亮光 */
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05); /* 轻微的阴影增加立体感 */
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: left; /* 日志文字靠左对齐更利于阅读 */
            overflow-y: auto; /* 如果以后日志写得太长，允许卡片内部上下滚动 */
        }

        .left-panel h2, .right-panel h2 {
            margin-top: 0;
            border-bottom: 2px solid rgba(255, 255, 255, 0.5); /* 标题下方加一条分割线 */
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-size: 24px;
            color: #222;
        }

        /* 更新日志列表的具体排版 */
        .changelog-list {
            list-style: none; /* 去掉默认的小黑点 */
            padding: 0;
            margin: 0;
            line-height: 1.8;
        }

        .changelog-list li {
            margin-bottom: 15px;
            font-size: 16px;
            color: #333;
        }

        /* 日志日期的小标签美化 */
        .changelog-list .date {
            display: inline-block;
            background: rgba(0, 0, 0, 0.1);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-family: monospace;
            margin-right: 12px;
            color: #111;
        }
        
        /* 美化内部滚动条（如果是 Webkit 浏览器） */
        .left-panel::-webkit-scrollbar, .right-panel::-webkit-scrollbar {
            width: 6px;
        }
        .left-panel::-webkit-scrollbar-thumb, .right-panel::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <video id="bg-video" autoplay loop muted playsinline></video>
    <div class="main-content"> ```
    <img src="title.png" alt="我的主页标题" class="custom-title">
    <div class="card">
        <div id="quote">Loading today's inspiration...</div>
        <div id="author"></div>
    </div>

    <form class="search-container" action="https://www.google.com/search" method="GET" target="_blank">
        <input type="text" name="q" class="search-input" placeholder="Why not turn to Google?" autocomplete="off" required>
        <button type="submit" class="search-btn">search</button>
    </form>

    <div id="weather" class="weather-widget">Loading...</div>
    

    <div class="link-container">
        <a href="https://www.google.com" target="_blank" class="nav-icon" title="Google">
            <img src="https://www.google.com/s2/favicons?domain=google.com&sz=64" alt="Google">
        </a>
        <a href="https://www.youtube.com" target="_blank" class="nav-icon" title="YouTube">
            <img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=64" alt="YouTube">
        </a>
        <a href="https://github.com" target="_blank" class="nav-icon" title="GitHub">
            <img src="https://www.google.com/s2/favicons?domain=github.com&sz=64" alt="GitHub">
        </a>
        <a href="https://gemini.google.com" target="_blank" class="nav-icon" title="Gemini AI">
            <img src="https://www.google.com/s2/favicons?domain=gemini.google.com&sz=64" alt="Gemini">
        </a>
        <a href="https://www.wikipedia.org" target="_blank" class="nav-icon" title="Wikipedia">
            <img src="https://www.google.com/s2/favicons?domain=wikipedia.org&sz=64" alt="Wikipedia">
        </a>
         <a href="www.gradescope.com" target="_blank" class="nav-icon" title="Gradescope">
             <img src="https://www.google.com/s2/favicons?domain=gradescope.com&sz=64" alt="Gradescope">
        </a>
        <a href="https://translate.google.com/?hl=zh-cn&sl=auto&tl=en&op=translate" target="_blank" class="nav-icon" title="Google Translate">
             <img src="https://www.google.com/s2/favicons?domain=translate.google.com&sz=64" alt="Google Translate">
        </a>
        <a href="https://piazza.com" target="_blank" class="nav-icon" title="Piazza">
             <img src="https://www.google.com/s2/favicons?domain=piazza.com&sz=64" alt="Piazza">
        </a>
    </div>

    </div> <div class="second-page">
        <div class="split-container">
            <div class="left-panel">
                <h2>Updates & Changes</h2>
                <ul class="changelog-list">
                    <li><span class="date">今天</span> 成功接入了 Node.js 全栈动态动漫壁纸！🎉</li>
                    <li><span class="date">最近</span> 实现了丝滑的 CSS 纯代码全屏滚动翻页。</li>
                    <li><span class="date">最近</span> 彻底搞懂了跨域限制，API 名言组件完美运行。</li>
                    <li><span class="date">早期</span> 新增了底部毛玻璃菜单与内置音乐播放器。</li>
                </ul>
            </div>
            <div class="right-panel">
                <h2>To-Do List</h2>
                <p style="color: #555; margin-top: 20px;">（右侧空间已就绪，等待注入 To-Do List 灵魂...）</p>
            </div>
        </div>
    </div>

   <div class="bottom-menu-container">
        <div class="menu-trigger">🎵</div>
        <div class="blank-panel">
            <div class="panel-content">
                <h3>🎵 轻松一刻</h3>
                <audio controls>
                    <source src="''Over Quartzer''(Instrumental).mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>
        </div>
    </div>

    <script>
        function getDailyQuote() {
            const today = new Date().toDateString();
            const saved = localStorage.getItem("dailyQuote");

            // 如果本地有缓存，且日期是今天，直接使用本地数据
            if (saved) {
                const obj = JSON.parse(saved);
                if (obj.date === today) {
                    display(obj.data);
                    return;
                }
            }

            // 如果没有缓存或日期不是今天，向 API 请求新数据
            // 【修改点1】在原 API 链接前加上 corsproxy 代理前缀，绕过跨域限制
            // 【修改点1】放弃代理，使用原生支持且极其稳定的 DummyJSON 接口
            fetch("https://dummyjson.com/quotes/random")
                .then(res => {
                    if (!res.ok) throw new Error("网络响应错误");
                    return res.json();
                })
                .then(data => {
                    // 【修改点2】解析 DummyJSON 的格式（它的字段名叫 quote 和 author）
                    const formattedData = {
                        content: data.quote,
                        author: data.author
                    };

                    // 保存到本地存储（我们已经写了逻辑，确保它今天之内不会再变了！）
                    localStorage.setItem("dailyQuote", JSON.stringify({
                        date: today,
                        data: formattedData
                    }));
                    
                    // 展示名言
                    display(formattedData);
                })
                .catch(error => {
                    console.error("获取名言失败:", error);
                    const fallbackData = {
                        content: "The best way to predict the future is to invent it.",
                        author: "Alan Kay"
                    };
                    display(fallbackData);
                });
        }

        function display(data) {
            document.getElementById("quote").innerText = data.content;
            document.getElementById("author").innerText = "- " + data.author;
        }

        // 执行函数
        getDailyQuote();

        // -- 获取天气的逻辑 --
        function getWeather() {
            // 请求 wttr.in 接口，%l 代表基于 IP 的城市，%t 代表当前温度
            fetch("https://wttr.in/Pudong?format=%c\ShanghaiTech\:%C,+%t")
                .then(res => {
                    if (!res.ok) throw new Error("天气请求失败");
                    return res.text();
                })
                .then(text => {
                    // 把获取到的文本（如：Singapore: +28°C）放进网页
                    document.getElementById("weather").innerText = text;
                })
                .catch(error => {
                    console.error("天气获取失败:", error);
                    document.getElementById("weather").innerText = "暂无天气信息";
                });
        }

        // 执行天气函数
        getWeather();

        // -- 获取动态壁纸逻辑 --
        function loadDynamicWallpaper() {
            // 请求我们自己写的本地 Node.js 后端
            fetch('https://yuowwosdashboard.onrender.com/api/random-wallpaper')
                .then(res => res.json())
                .then(data => {
                    if(data.videoUrl) {
                        document.getElementById('bg-video').src = data.videoUrl;
                    } else {
                        console.error("未能获取视频地址", data);
                    }
                })
                .catch(err => console.error("后端连接失败，请确保 Node 服务器已启动", err));
        }

        // 执行获取壁纸
        loadDynamicWallpaper();
    </script>
</body>
</html>
